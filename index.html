*{box-sizing:border-box}
[hidden]{display:none!important}
html,body{margin:0;padding:0;background:#ffffff}
body{
  min-height:100vh;color:#000;
  font-family:"Calibri","Carlito","Segoe UI",system-ui,-apple-system,Arial,sans-serif;
  font-size:16px;line-height:1.6;
}
/* invisible paste surface: the page looks like a blank white screen */
#pad{
  position:fixed;inset:0;width:100%;height:100%;
  outline:none;border:none;background:#fff;caret-color:transparent;color:#fff;
}
#out{display:none;padding:3vw 4vw;width:100%}
.title{font-weight:800;font-size:21px;text-align:center;margin:26px 0 8px}
.tag{font-weight:800;font-size:17px;margin:20px 0 6px}
.read{font-weight:600;color:#000}
mark{background:var(--c,#fff23b);color:var(--i,#000);padding:.02em .06em;border-radius:3px;-webkit-box-decoration-break:clone;box-decoration-break:clone}
.an{margin:14px 0}
.num{font-weight:800}
#dropbtn{
  position:fixed;top:14px;left:14px;z-index:50;width:42px;height:42px;
  display:grid;place-items:center;cursor:pointer;
  background:#fff;border:1px solid #e0e4ea;border-radius:12px;color:#65748b;
  box-shadow:0 1px 3px rgba(16,24,40,.08);transition:all .15s ease;
}
#dropbtn:hover{color:#111c2e;border-color:#c6cdd8;transform:translateY(-1px)}
#dropbtn:active{transform:scale(.95)}
#dropbtn svg{width:20px;height:20px}
#dropwrap{position:fixed;inset:0;z-index:60;background:rgba(255,255,255,.96);display:grid;place-items:center;padding:6vw}
#dropbox{
  width:min(640px,92vw);border:2.5px dashed #b9c3d2;border-radius:22px;background:#fff;
  padding:70px 30px;text-align:center;cursor:pointer;transition:all .15s ease;
}
#dropbox:hover,#dropbox.hot{border-color:#3661a8;background:#f4f7fc}
.d-big{font-size:24px;font-weight:800;color:#111c2e}
.d-sub{color:#65748b;margin-top:6px}
.d-err{color:#c2413d;margin-top:14px;font-size:14px;min-height:1em}
</style>
</head>

window.CardReaderParser=(function(){
const W='http://schemas.openxmlformats.org/wordprocessingml/2006/main';
const XMLNS='http://www.w3.org/XML/1998/namespace';

/* ---- 16 named Word highlight colors -> display hex (keys lower-cased) ---- */
const NAMED={
  black:'#3a3a3a', blue:'#5b7cff', cyan:'#22e0ef', darkblue:'#25408f', darkcyan:'#0f8ea0',
  darkgreen:'#1f8a4c', darkmagenta:'#9b2b8f', darkred:'#c0392b', darkyellow:'#b7952b',
  green:'#37e08a', lightgray:'#d9dee6', darkgray:'#9aa6b4', magenta:'#ff5bd0',
  red:'#ff5a5a', white:'#ffffff', yellow:'#fff23b'

const THEME_NEUTRAL='#c9d6ea';

/* ---- Word list numbering (numbering.xml) ---- */

/* Shared back-half: reconstruct numbering → classify roles → group → build streams.

  // "the line sits above a citation": a non-highlighted definition/warning that comes

  // above its citation is a short plain paragraph, promote it to the tag. (Only fires
  // when no strong/bold/styled tag was found, so it can't hijack a real tag.)
  for(const b of blocks){
    if(b.type!=='card'||b.tag||!b.paras.length)continue;
    let ci=-1; for(let k=0;k<b.paras.length;k++){ if(b.paras[k].role==='cite'){ci=k;break;} }
    if(ci>=1){
      const cand=b.paras[ci-1];
      if(cand&&cand.wordCount>=1&&cand.wordCount<=30&&!cand.hasHighlight&&!cand.citeish){
        b.tag=cand.text.trim(); b.tagPara=cand; b.paras.splice(ci-1,1);
      }
    }
  }

  // A "card" whose tag rode in on weak formatting cues (a bit bigger or partly
  // bold, but not styled, not strongly bold, not a section name) and that has NO
  // citation of its own is not a card: it's an emphasis line or pull-quote INSIDE
  // the previous card's evidence (unshrunk default-size prose in condensed docs).
  // Fold it back into the previous card as body text.
  for(let bi=blocks.length-1;bi>=1;bi--){
    const b=blocks[bi],prev=blocks[bi-1];
    if(b.type!=='card'||prev.type!=='card')continue;
    if(!b.tag||!b.tagPara)continue;
    if(b.paras.some(function(p){return p.role==='cite';}))continue;
    const tp=b.tagPara;
    if(tp.fracBold>=0.5||tp.allCaps)continue;
    if(styleIsHeaderish(tp.styleName)||sectionName(tp.text))continue;
    tp.role='body';
    prev.paras.push(tp);
    for(const pa of b.paras)prev.paras.push(pa);
    blocks.splice(bi,1);
  }

  // An untagged, cite-less card that follows a tagged card is a CONTINUATION of
  // that card, even across intervening "analytics" that are really unshrunk,
  // unhighlighted, non-bold lines inside the evidence (default-size prose the
  // cutter never minimized). Fold the in-between blocks and the continuation
  // back in, so a card's highlighted text always reads as one flow.
  {
    let i=1;
    while(i<blocks.length){
      const b=blocks[i];
      if(b.type!=='card'||b.tag){i++;continue;}
      if(b.paras.some(function(p){return p.role==='cite';})){i++;continue;}   // has its own cite: a real (untagged) card
      let j=i-1;const between=[];
      while(j>=0&&blocks[j].type==='analytics'
            &&blocks[j].paras.every(function(p){return !p.hasHighlight&&p.fracBold<0.5&&!styleIsHeaderish(p.styleName)&&!sectionName(p.text);})){
        between.unshift(j);j--;
      }
      if(j>=0&&blocks[j].type==='card'&&blocks[j].tag){
        const host=blocks[j];
        for(const bi2 of between){for(const p of blocks[bi2].paras){p.role='body';host.paras.push(p);}}
        for(const p of b.paras)host.paras.push(p);
        blocks.splice(j+1,i-j);
        i=j+1;continue;
      }
      i++;
    }
  }

  // An "untagged card" with NO citation and NO highlighting isn't a card at all:
  // it's spoken analytic text (theory interps, standards, transitions) that
  // followed a title. Reclassify so theory docs don't sprout empty cards.
  for(let bi=0;bi<blocks.length;bi++){
    const b=blocks[bi];
    if(b.type!=='card'||b.tag)continue;
    const hasCite=b.paras.some(function(p){return p.role==='cite';});
    const hasHl=b.paras.some(function(p){return p.hasHighlight;});
    if(!hasCite&&!hasHl)blocks[bi]={type:'analytics',paras:b.paras};
  }

  // ============================================================
  //  Author-year on tags. Every tag should end with "Author 'YY".
  //  Rules (in order), designed so no case ever doubles up:
  //   1. If the tag ALREADY ends with an author-year, just normalize its
  //      apostrophe (add a canonical ' before the 2-digit year if missing)
  //      and STOP. Never append a second copy.  <- fixes "Dartnell 'X, Dartnell X"
  //   2. Otherwise pull the author's surname + year from the card's citation.
  //      - if that surname is already named in the tag, append only the year
  //        (e.g. "...Bradshaw et al" -> "...Bradshaw et al '21");
  //      - else append "Author 'YY".
  //   3. If no year can be found anywhere, use "ND".
  //  Any apostrophe variant (' ' ` ´ straight) is recognized; we always emit '.
  // ============================================================
  const CANON="’";                                              // the apostrophe we emit
  // an author-year already sitting at the END of the tag
  // "already processed" = the tag already ends with a year (apostrophized or bare)
  // or with our own "ND" marker. Deliberately broad so re-parsing an augmented tag
  // (e.g. through the in-place editor) is a no-op and never double-appends.
  const HAS_TRAIL_YEAR=/(?:['‘’ʼ`´]\s?\d{2,4}|\b\d{2}['‘’ʼ`´]?)\s*[.,;:!?]*\s*$/;
  const HAS_TRAIL_ND=/\bND\b\s*[.,;:!?]*\s*$/;
  function apostrophizeTail(s){
    // normalize a trailing 2-digit year to 'YY: handles bare "24", "'24" variants,
    // AND the trailing-apostrophe style "24'" (which otherwise caused re-appends)
    return s.replace(/([A-Za-z.)\]"’”]\s+)(?:['‘’ʼ`´]\s?)?(\d{2})['‘’ʼ`´]?(\s*[.,;:!?]*\s*)$/,
      function(_all,pre,yy,tail){return pre+CANON+yy+tail;});
  }
  const AUTHOR_STOP=/^(?:The|A|An|And|Or|But|Not|No|If|As|At|By|For|From|In|On|Of|To|With|While|When|Where|Why|How|What|Which|Who|After|Before|During|Since|Until|Over|Under|Between|Most|Many|Some|All|Both|Each|Less|More|Also|However|Their|There|These|Those|This|That|It|Its|Our|We|You|They|He|She|Dr|Mr|Ms|Mrs|Prof|Effects|Indeed|First|Second|Third|Otherwise)$/i;
  const NAME_CH="A-Za-zÀ-ÖØ-öø-ÿ";     // letters incl. accents (Naudé)
  function authorYearFromCite(text){
    if(!text)return {author:null,year:null};
    let t=text.replace(/[​‌﻿]/g,'')
              .replace(/https?:\/\/\S+|www\.\S+/gi,' ')             // URLs are digit soup, never the year
              .replace(/\s+/g,' ').trim();
    let author=null,year=null,m;
    // 1) the leading "Author(s) YY [" / "( " / "—" / "." form wins for BOTH fields:
    //    "Walker 23 [Robert...", "Beckstead '15 [Nick...", "Mihai Andrei 22. Master's...",
    //    "Unger 9—founding member...", "David Denkenberger et al. 17, [Dr. ..."
    m=t.match(new RegExp("^((?:['‘’“”\"]?[A-Z][."+NAME_CH+"'‘’-]*[\\s,]+){0,3}['‘’“”\"]?[A-Z][."+NAME_CH+"'‘’-]+)(?:\\s+et\\s+al\\.?|\\s+(?:and|&)\\s+[A-Z][."+NAME_CH+"'‘’-]+)?[\\s,]*['‘’ʼ`´]?(ND|\\d{1,2})\\s*[\\[\\(—–.,;-]"));
    if(m){
      const words=m[1].replace(/['‘’“”"]/g,' ').trim().split(/\s+/).filter(function(w){return new RegExp('['+NAME_CH+']').test(w);});
      let idx=words.length-1;
      while(idx>0&&/^[A-Z]\.?$/.test(words[idx]))idx--;
      author=words[idx];
      year=(m[2]==='ND'||m[2]===undefined)?null:m[2];
      if(year&&year.length===1)year='0'+year;
      if(m[2]==='ND')return {author:cleanAuthor(author),year:null};
    }
    // 2) year fallbacks, in decreasing reliability
    if(!year){m=t.match(/\b\d{1,2}[\/\-.]\d{1,2}[\/\-.](?:19|20)?(\d{2})\b/);if(m)year=m[1];} // 4/14/05, 3-10-25
    if(!year){m=t.match(/\b(?:19|20)(\d{2})\b/);if(m)year=m[1];}                              // April 13, 2015
    if(!year){m=t.match(/['‘’ʼ`´](\d{2})\b/);if(m)year=m[1];}                  // 'YY anywhere
    // 3) author fallbacks
    if(!author){
      m=t.match(new RegExp("^([A-Z]["+NAME_CH+"'‘’.-]+)\\s*,\\s*[A-Z]"));          // "Smith, John. ..."
      if(m)author=m[1];
    }
    if(!author){
      m=t.match(new RegExp("^((?:[A-Z]["+NAME_CH+"'‘’.-]*\\s+){0,4}[A-Z]["+NAME_CH+"'‘’.-]+)\\s*[\\[\\(‘'\"“,]"));
      if(m){
        const words=m[1].trim().split(/\s+/).filter(function(w){return new RegExp('['+NAME_CH+']').test(w);});
        let idx=words.length-1;
        while(idx>0&&/^[A-Z]\.?$/.test(words[idx]))idx--;
        author=words[idx];
      }
    }
    if(!author){m=t.match(new RegExp("^([A-Z]["+NAME_CH+"'‘’-]{2,})\\b"));if(m)author=m[1];}
    return {author:cleanAuthor(author),year:year};
  }
  function cleanAuthor(last){
    if(!last)return null;
    last=last.replace(/[.,;:]+$/,'');
    if(last.length<2)return null;
    // sentence-starters are never author surnames; a "cite" that begins with one
    // is prose, and inventing "The '19" or "After '73" is worse than no author
    if(AUTHOR_STOP.test(last))return null;
    return last;
  }
  function reEsc(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
  // reconcile a tagPara's runs to a new full string, editing only the changed
  // tail so existing run formatting (bold/size/highlight) is preserved
  function retextRuns(runs,newText){
    let acc='';
    for(let i=0;i<runs.length;i++){
      const combined=acc+runs[i].text;
      if(newText.indexOf(combined)===0){acc=combined;continue;}      // run unchanged
      if(newText.indexOf(acc)===0){                                  // run i diverges
        runs[i].text=newText.slice(acc.length);
        for(let j=i+1;j<runs.length;j++)runs[j].text='';
        return;
      }
      break;
    }
    const rem=newText.slice(acc.length);                             // pure append
    if(rem){
      const lr=runs.length?runs[runs.length-1]:null;
      runs.push({text:rem,tier:(lr&&lr.tier==='read')?'emph':(lr?lr.tier:'emph'),color:null,
                 szHP:lr?lr.szHP:26,bold:lr?lr.bold:true,underline:false,italic:lr?lr.italic:false});
    }
  }
  function setTag(b,newTag){
    if(b.tagPara&&b.tagPara.runs&&b.tagPara.runs.length){
      retextRuns(b.tagPara.runs,newTag);
      b.tagPara.runs=b.tagPara.runs.filter(function(r){return r.text.length;});
      b.tagPara.text=b.tagPara.runs.map(function(r){return r.text;}).join('');
      b.tag=b.tagPara.text.trim();
    }else{
      b.tag=newTag.trim();
    }
  }
  for(const b of blocks){
    if(b.type!=='card'||!b.tag)continue;
    const tag=b.tag.replace(/\s+$/,'');
    if(HAS_TRAIL_YEAR.test(tag)){                                    // rule 1: already ends with a year
      const fixed=apostrophizeTail(tag);
      if(fixed!==tag)setTag(b,fixed);
      continue;
    }
    if(HAS_TRAIL_ND.test(tag))continue;                             // already marked ND: leave as is
    const citePa=(b.paras||[]).find(function(p){return p.role==='cite';});
    const ay=authorYearFromCite(citePa?citePa.text:'');             // rules 2-3
    const yearStr=ay.year?(CANON+ay.year):'ND';
    let suffix;
    // suppress the author only when it already ENDS the tag ("...Bradshaw et al"
    // gets just the year); an incidental mention mid-tag still gets the full pair
    const endsWithAuthor=ay.author&&new RegExp('\\b'+reEsc(ay.author)+"(?:\\s+et\\s+al\\.?|\\s+(?:and|&)\\s+[A-Za-z'’.\\-]+)?\\s*[.,;:!?]*$",'i').test(tag);
    if(endsWithAuthor)suffix=yearStr;
    else if(ay.author)suffix=ay.author+' '+yearStr;
    else suffix=yearStr;
    const sep=/[.,;:!?]$/.test(tag)?' ':', ';
    setTag(b,tag+sep+suffix);
  }

  // ---- spoken text (with spacing fix) + full-body html, per card ----
  function escHtml(s){return (s||'').replace(/[&<>]/g,function(c){return c==='&'?'&amp;':c==='<'?'&lt;':'&gt;';});}
  function buildSpoken(paraList){
    // ordered runs across the card's paragraphs, with a break between paragraphs
    let text='',html='',started=false,pendingBreak=false;
    for(let pi=0;pi<paraList.length;pi++){
      if(pi>0&&started)pendingBreak=true; // paragraph boundary breaks a phrase
      for(const r of paraList[pi].runs){
        if(r.tier==='read'){
          let piece=r.text;
          if(started&&pendingBreak){
            const leftWs=/\s$/.test(text), rightWs=/^\s/.test(piece);
            if(!leftWs&&!rightWs){ text+=' '; html+=' '; }        // insert exactly one space
            else if(leftWs&&rightWs){ piece=piece.replace(/^\s+/,''); } // both carry ws -> collapse to one
          }
          text+=piece;
          html+='<mark class="hl" style="--hlc:'+cssColor(r.color)+';--hli:'+inkFor(r.color)+'">'+escHtml(piece)+'</mark>';
          started=true;pendingBreak=false;
        } else {
          if(started)pendingBreak=true;
        }
      }
    }
    return {text:text.trim(),html:html};
  }

  let readWords=0,bulkWords=0,tagWords=0,titleWords=0,analyticWords=0,cardCount=0,titleCount=0,analyticCount=0;
  const bulkPieces=[];
  const tagTitlePieces=[];
  for(const b of blocks){
    if(b.type==='title'){titleCount++;titleWords+=wordCount(b.text);tagTitlePieces.push(b.text);continue;}
    if(b.type==='analytics'){
      analyticCount++;
      const at=b.paras.map(function(pa){const t=pa.text.trim();return t?((pa.numText?pa.numText+' ':'')+t):'';}).filter(Boolean).join('\n');
      b.analyticText=at;
      analyticWords+=wordCount(at);
      if(at)tagTitlePieces.push(at);   // analytics are KEPT (read aloud), never bulk
      continue;
    }
    cardCount++;
    if(b.tag){tagWords+=wordCount(b.tag);tagTitlePieces.push(b.tag);}
    const sp=buildSpoken(b.paras);
    b.spokenText=sp.text;b.spokenHtml=sp.html;
    readWords+=wordCount(sp.text);
    // bulk = every non-read run in this card's cite/body paragraphs
    let cardBulk='';
    for(const pa of b.paras){
      let line='';
      for(const r of pa.runs){ if(r.tier!=='read') line+=r.text; }
      if(line.trim())cardBulk+=(cardBulk?'\n':'')+line;
    }
    if(cardBulk.trim()){bulkPieces.push(cardBulk);bulkWords+=wordCount(cardBulk);}
  }

  const streams={
    tags:tagTitlePieces.join('\n'),
    spoken:blocks.filter(function(b){return b.type==='card'&&b.spokenText;}).map(function(b){return b.spokenText;}).join('\n\n'),
    bulk:bulkPieces.join('\n\n')
  };

  return {
    blocks:blocks,
    streams:streams,
    stats:{
      readWords:readWords,bulkWords:bulkWords,tagWords:tagWords,titleWords:titleWords,
      analyticWords:analyticWords,analyticCount:analyticCount,
      /* everything actually said aloud: highlighted text + tags + contention titles + analytics */
      spokenWords:readWords+tagWords+titleWords+analyticWords,
      cardCount:cardCount,titleCount:titleCount,
      bodySize:bodySize,sizeGate:sizeGate,
      totalWords:paras.reduce(function(a,p){return a+p.wordCount;},0)
    }
  };
}

/* luminance-based ink so text stays readable on any highlight color */
function inkFor(hex){
  if(!hex)return '#0b1220';
  let c=(''+hex).replace('#','');
  if(c.length===3)c=c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
  if(c.length!==6)return '#0b1220';
  const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);
  if(isNaN(r)||isNaN(g)||isNaN(b))return '#0b1220';
  const L=(0.299*r+0.587*g+0.114*b)/255;
  return L>0.55?'#0b1220':'#ffffff';
}

/* ---------- paste path: build the same model from pasted rich HTML ----------
   When you copy a cut card from Word / Google Docs and paste it into a contenteditable,
   the browser keeps the formatting as inline styles (background-color = highlight, bold,
   font-size, underline). We read those off the live DOM to build the same `paras`. */
function parseCssColor(s){
  if(!s)return null; s=s.trim();
  let m=s.match(/^rgba?\(([^)]+)\)/i);
  if(m){ const p=m[1].split(',').map(function(x){return parseFloat(x);}); return {r:p[0]|0,g:p[1]|0,b:p[2]|0,a:p.length>3?p[3]:1}; }
  m=s.match(/^#([0-9a-f]{3}|[0-9a-f]{6})$/i);
  if(m){ let h=m[1]; if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2]; return {r:parseInt(h.slice(0,2),16),g:parseInt(h.slice(2,4),16),b:parseInt(h.slice(4,6),16),a:1}; }
  return null;
}
function rgbToHex(c){ function h(n){n=Math.max(0,Math.min(255,n|0)).toString(16);return n.length<2?'0'+n:n;} return '#'+h(c.r)+h(c.g)+h(c.b); }
function domHighlightColor(node,stop){
  let el=node.parentElement;
  while(el&&el!==stop){
    const c=parseCssColor(getComputedStyle(el).backgroundColor);
    if(c&&c.a>0.05&&!(c.r>244&&c.g>244&&c.b>244)){
      if(c.r<40&&c.g<40&&c.b<40)return null;   // blacked-out = redacted, never read
      return rgbToHex(c);                       // non-transparent, non-white => highlight
    }
    el=el.parentElement;
  }
  return null;
}
function domAncestorIs(node,tags,stop){ let el=node.parentElement; while(el&&el!==stop){ if(tags.indexOf(el.tagName)>=0)return true; el=el.parentElement; } return false; }
function domAncestorUnderline(node,stop){ let el=node.parentElement; while(el&&el!==stop){ const td=getComputedStyle(el).textDecorationLine||getComputedStyle(el).textDecoration||''; if(/underline/.test(td))return true; if(el.tagName==='U')return true; el=el.parentElement; } return false; }
function buildCardModelFromDom(root){
  const BLOCK=['P','DIV','LI','H1','H2','H3','H4','H5','H6','BLOCKQUOTE','PRE','TR','SECTION'];
  let leaves=Array.prototype.slice.call(root.querySelectorAll(BLOCK.map(function(t){return t.toLowerCase();}).join(',')))
                   .filter(function(b){return !b.querySelector(BLOCK.map(function(t){return t.toLowerCase();}).join(','));});
  if(!leaves.length)leaves=[root];
  const paras=[];
  for(const blk of leaves){
    if(domAncestorIs(blk.firstChild||blk,['DEL','S','STRIKE'],root))continue;
    const runs=[]; let boldChars=0,totalChars=0,maxSizeHP=0,text='';
    const tw=document.createTreeWalker(blk,NodeFilter.SHOW_TEXT,null,false);
    let node;
    while((node=tw.nextNode())){
      let t=node.nodeValue; if(!t)continue;
      if(domAncestorIs(node,['DEL','S','STRIKE','SCRIPT','STYLE'],blk))continue;
      const cs=getComputedStyle(node.parentElement);
      const bold=(parseInt(cs.fontWeight,10)||400)>=600||domAncestorIs(node,['B','STRONG'],blk);
      const italic=cs.fontStyle==='italic'||cs.fontStyle==='oblique'||domAncestorIs(node,['I','EM'],blk);
      const underline=domAncestorUnderline(node,blk);
      const px=parseFloat(cs.fontSize)||16;
      const szHP=Math.max(2,Math.round(px*1.5));          // css px -> half-points (px*0.75pt*2)
      const color=domHighlightColor(node,root);
      const tier=color?'read':((bold||underline)?'emph':'bulk');
      runs.push({text:t,tier:tier,color:color,szHP:szHP,bold:bold,underline:underline,italic:italic});
      const len=t.length; totalChars+=len; if(bold)boldChars+=len;
      const trimmed=t.trim(); if(trimmed){ if(szHP>maxSizeHP)maxSizeHP=szHP; }
      text+=t;
    }
    if(!text.trim())continue;
    const cr=capsRatio(text);
    const tag=blk.tagName;
    // the in-app editor round-trips the ORIGINAL Word style name through this
    // attribute so styled tags/headers keep their meaning after an edit
    const crStyle=blk.getAttribute&&blk.getAttribute('data-cr-style');
    const styleName=crStyle||(/^H[1-6]$/.test(tag)?('heading '+tag[1]):tag.toLowerCase());
    const numbered=tag==='LI'&&(function(){let e=blk.parentElement;while(e){if(e.tagName==='OL')return true;if(e.tagName==='UL')return false;e=e.parentElement;}return false;})();
    paras.push({
      el:blk,runs:runs,text:text,wordCount:wordCount(text),maxSizeHP:maxSizeHP,
      fracBold:totalChars?boldChars/totalChars:0,
      hasHighlight:runs.some(function(r){return r.tier==='read';}),
      allCaps:(cr.ratio>=0.72&&cr.letters>=4),
      styleName:styleName,styleId:'',citeish:isCiteish(text),
      numId:numbered?'htmlol':null,ilvl:0,numText:null,role:null
    });
  }
  if(!paras.length) throw new Error('No readable text was found in what you pasted.');
  return finishCardModel(paras,{});
}

return {buildCardModel:buildCardModel,buildCardModelFromDom:buildCardModelFromDom,inkFor:inkFor,cssColor:cssColor};
})();
</script>

<script>
"use strict";
(function(){
const P=window.CardReaderParser;
function esc(s){return (s||'').replace(/[&<>]/g,function(c){return c==='&'?'&amp;':c==='<'?'&lt;':'&gt;';});}
function sanitize(html){
  let doc;
  try{doc=new DOMParser().parseFromString('<div>'+String(html)+'</div>','text/html');}catch(e){return '';}
  const BAD=/^(script|style|iframe|object|embed|link|meta|form|base|frame|frameset)$/i;
  (function walk(node){
    const kids=Array.prototype.slice.call(node.children||[]);
    kids.forEach(function(el){
      if(BAD.test(el.tagName)){el.remove();return;}
      Array.prototype.slice.call(el.attributes).forEach(function(a){
        const n=a.name.toLowerCase(),v=(a.value||'').replace(/[\s]+/g,'').toLowerCase();
        if(n.indexOf('on')===0){el.removeAttribute(a.name);return;}
        if((n==='href'||n==='src'||n==='srcset'||n==='xlink:href')&&(v.indexOf('javascript:')===0||v.indexOf('vbscript:')===0||v.indexOf('data:text/html')===0))el.removeAttribute(a.name);
      });
      walk(el);
    });
  })(doc.body);
  return doc.body.firstChild?doc.body.firstChild.innerHTML:'';
}
function render(model){
  let html='';
  for(const b of model.blocks){
    if(b.type==='title'){html+='<div class="title">'+esc(b.text)+'</div>';continue;}
    if(b.type==='analytics'){
      let lines='';
      for(const pa of b.paras){
        const t=pa.text.trim();if(!t)continue;
        lines+='<div>'+(pa.numText?'<span class="num">'+esc(pa.numText)+'</span> ':'')+esc(t)+'</div>';
      }
      if(lines)html+='<div class="an">'+lines+'</div>';
      continue;
    }
    if(b.tag)html+='<div class="tag">'+esc(b.tag)+'</div>';
    if(b.spokenHtml)html+='<div class="read">'+b.spokenHtml+'</div>';
  }
  html=html.replace(/--hlc:/g,'--c:').replace(/--hli:/g,'--i:');
  const out=document.getElementById('out'),pad=document.getElementById('pad');
  out.innerHTML=html;
  out.style.display=html?'block':'none';
  pad.style.display=html?'none':'block';
  window.scrollTo(0,0);
}
function readHtml(html){
  html=sanitize(html);
  if(!html||!html.replace(/<[^>]*>/g,'').trim())return;
  const tmp=document.createElement('div');
  tmp.style.cssText='position:fixed;left:-12000px;top:0;width:800px;background:#fff;';
  tmp.innerHTML=html;
  document.body.appendChild(tmp);
  let model=null;
  try{model=P.buildCardModelFromDom(tmp);}catch(e){}
  document.body.removeChild(tmp);
  if(model)render(model);
}
window.__read=readHtml;   // test hook
window.addEventListener('paste',function(e){
  const cd=e.clipboardData;if(!cd)return;
  e.preventDefault();
  const html=cd.getData('text/html');
  if(html){readHtml(html);return;}
  const txt=cd.getData('text/plain');
  if(txt)readHtml(txt.split(/\n+/).map(function(l){return '<div>'+esc(l)+'</div>';}).join(''));
},true);
// ---- docx drop box ----
const wrap=document.getElementById('dropwrap'),box=document.getElementById('dropbox'),
      pick=document.getElementById('dpick'),derr=document.getElementById('droperr');
function openDrop(){wrap.hidden=false;derr.textContent='';}
function closeDrop(){wrap.hidden=true;}
document.getElementById('dropbtn').addEventListener('click',function(e){e.stopPropagation();openDrop();});
wrap.addEventListener('click',function(e){if(e.target===wrap)closeDrop();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeDrop();});
box.addEventListener('click',function(e){e.stopPropagation();pick.value='';pick.click();});
box.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();pick.value='';pick.click();}});
pick.addEventListener('change',function(e){const f=e.target.files&&e.target.files[0];if(f)readDocx(f);});
['dragenter','dragover'].forEach(function(ev){
  box.addEventListener(ev,function(e){e.preventDefault();e.stopPropagation();box.classList.add('hot');});
  window.addEventListener(ev,function(e){e.preventDefault();});
});
['dragleave','drop'].forEach(function(ev){
  box.addEventListener(ev,function(e){if(ev==='dragleave')box.classList.remove('hot');});
});
box.addEventListener('drop',function(e){
  e.preventDefault();e.stopPropagation();box.classList.remove('hot');
  const f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];
  if(f)readDocx(f);
});
window.addEventListener('drop',function(e){
  e.preventDefault();
  const f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];
  if(f){if(wrap.hidden)openDrop();readDocx(f);}
});
async function readDocx(file){
  derr.textContent='';
  if(!/\.docx$/i.test(file.name||'')){derr.textContent='That is not a .docx file.';return;}
  try{
    const buf=await file.arrayBuffer();
    const zip=await JSZip.loadAsync(buf);
    const de=zip.file('word/document.xml');
    if(!de){derr.textContent='That file is not a normal Word document.';return;}
    const dx=await de.async('string');
    const se=zip.file('word/styles.xml'), ne=zip.file('word/numbering.xml');
    const st=se?await se.async('string'):'', nm=ne?await ne.async('string'):'';
    render(P.buildCardModel(dx,st,nm));
    closeDrop();
  }catch(e){derr.textContent='Could not open that file: '+((e&&e.message)||e);}
}
// keep the invisible pad focused so Cmd/Ctrl-V (and mobile long-press paste) always lands
const pad=document.getElementById('pad');
function refocus(){if(pad.style.display!=='none')pad.focus();}
document.addEventListener('DOMContentLoaded',refocus);
window.addEventListener('click',refocus);
refocus();
})();
</script>
